services:
  - type: web
    name: rag-game-reviews
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r ../requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: RAWG_API_KEY
        sync: false